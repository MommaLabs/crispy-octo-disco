name: Growth Pulse

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: growth-pulse-${{ github.ref }}
  cancel-in-progress: false

jobs:
  growth-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      STACKS_NETWORK: mainnet
      MINIMINT_CONTRACT_NAME: minimint-core-v-i27
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            timefi-growth-bot/package-lock.json
            timefi-starter-app/package-lock.json

      - name: Install and run growth bot
        working-directory: ./timefi-growth-bot
        run: |
          for i in {1..10}; do
            echo "Growth bot iteration $i/10"
            npm ci
            npm run start
          done

      - name: Install and run starter app
        working-directory: ./timefi-starter-app
        run: |
          for i in {1..10}; do
            echo "Starter app iteration $i/10"
            npm ci
            npm run start
          done
