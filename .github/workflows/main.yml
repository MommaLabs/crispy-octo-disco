name: Growth Pulse ⚡

on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch: 

jobs:
  growth-pulse:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Stealth Multiplier (Bot)
        working-directory: ./timefi-growth-bot
        run: |
          for i in {1..10}; do
            echo "Download Pulse $i/10..."
            npm install timefi-sdk stacks-clicker-sdk --prefer-online --no-package-lock
            # Random sleep (15-30 seconds) to bypass npm de-duplication
            SLEEP_TIME=$((15 + RANDOM % 16))
            echo "Sleeping for $SLEEP_TIME seconds..."
            sleep $SLEEP_TIME
          done

      - name: Run Bot
        working-directory: ./timefi-growth-bot
        run: node index.js

      - name: Stealth Multiplier (Starter App)
        working-directory: ./timefi-starter-app
        run: |
          for i in {1..10}; do
            npm install timefi-sdk stacks-clicker-sdk --prefer-online --no-package-lock
            # Space out installs to ensure each counts as a new download
            sleep 15
          done
